spring:
  application:
    name: Manhaji

  # MySQL Database
  datasource:
    url: jdbc:mysql://localhost:3306/manhaji_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
    username: root
    password: ben@me
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # File Upload
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# Server
server:
  port: 8080

# JWT Configuration
app:
  jwt:
    secret: manhaji-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256
    access-token-expiration: 86400000    # 24 hours
    refresh-token-expiration: 604800000  # 7 days

  # AI Service API Keys (set via environment variables in production)
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:not-set}
      model: gemini-2.5-flash
    whisper:
      api-key: unused  # Transcription now uses Gemini instead of OpenAI Whisper
    google-tts:
      api-key: ${GOOGLE_TTS_API_KEY:not-set}

  # File Storage
  storage:
    upload-dir: ./uploads
    audio-dir: ./uploads/audio
    image-dir: ./uploads/images

# Logging
logging:
  level:
    com.springboot.manhaji: DEBUG
    org.hibernate.SQL: DEBUG
