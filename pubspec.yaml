name: manhaji_app
description: "Manhaji - AI-Powered Personalized Learning for Palestinian Students"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.7.0
  shared_preferences: ^2.3.4
  google_sign_in: ^6.2.2
  just_audio: ^0.9.42
  cached_network_image: ^3.4.1
  lottie: ^3.3.1
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2
  intl: ^0.20.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.4
  record: ^5.2.0
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/

  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
        - asset: fonts/Cairo-Bold.ttf
          weight: 700
        - asset: fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: fonts/Cairo-Light.ttf
          weight: 300
